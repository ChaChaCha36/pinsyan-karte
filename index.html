const db = {
  async getPatients() {
    const { data } = await supabase.from('patients').select('*').order('created_at', { ascending: false });
    return data || [];
  },
  async addPatient(p) {
    const { data } = await supabase.from('patients').insert([{ name: p.name, age: p.age ? parseInt(p.age) : null, gender: p.gender, memo: p.memo }]).select();
    return data?.[0];
  },
  async deletePatient(id) { await supabase.from('patients').delete().eq('id', id); },
  async getRecords(patientId) {
    const { data } = await supabase.from('records').select('*').eq('patient_id', patientId).order('date', { ascending: true });
    return data || [];
  },
  async getAllRecords() {
    const { data } = await supabase.from('records').select('*').order('date', { ascending: false });
    return data || [];
  },
  async addRecord(r) {
    const { data } = await supabase.from('records').insert([{ patient_id: r.patientId, date: r.date, visit_no: r.visitNo, body_parts: r.bodyParts, pain_types: r.painTypes, techniques: r.techniques, reaction: r.reaction, score_before: r.scoreBefore, score_after: r.scoreAfter, note: r.note }]).select();
    return data?.[0];
  },
  async deleteRecord(id) { await supabase.from('records').delete().eq('id', id); },
  async exportCSV() {
    const { data: patients } = await supabase.from('patients').select('*');
    const { data: records } = await supabase.from('records').select('*');
    return { patients, records };
  }
};

function downloadCSV(filename, rows) {
  const csv = rows.map(r => Object.values(r).map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([Object.keys(rows[0]).join(',')+'\n'+csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}
